<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBot Pro | Advanced Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --sidebar: #0f172a;
            --card: rgba(30, 41, 59, 0.6);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --secondary: #818cf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        nav {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .nav-link.active {
            border-left: 3px solid var(--accent);
        }

        /* Main Content */
        main {
            margin-left: 260px;
            flex: 1;
            padding: 2.5rem;
            max-width: 1400px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header-title h1 {
            font-size: 1.875rem;
            font-weight: 700;
        }

        .header-title p {
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-running .dot { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-paused .dot { background: var(--warning); box-shadow: 0 0 10px var(--warning); }
        .status-stopped .dot { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            padding: 1.5rem;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Large Sections */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .panel {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 1rem;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .badge-buy { color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 0.25rem 0.5rem; border-radius: 6px; }
        .badge-sell { color: var(--danger); background: rgba(239, 68, 68, 0.1); padding: 0.25rem 0.5rem; border-radius: 6px; }

        /* Controls */
        .controls {
            display: flex;
            gap: 0.75rem;
        }

        button {
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }

        .btn-outline { background: transparent; border-color: rgba(255, 255, 255, 0.1); color: var(--text); }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.05); }

        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        /* Terminal Logs */
        .logs-container {
            background: #000;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            height: 300px;
            overflow-y: auto;
            color: #ccc;
            line-height: 1.5;
        }

        .log-line { border-bottom: 1px solid #111; padding: 2px 0; }
        .log-info { color: #38bdf8; }
        .log-error { color: #ef4444; }
        .log-warning { color: #f59e0b; }

        /* Pair Tags */
        .pair-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .pair-tag {
            padding: 0.4rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
        }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; }
        .btn-icon:hover { color: var(--danger); }

        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            nav { display: none; }
            main { margin-left: 0; padding: 1.5rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">
            <i data-lucide="activity"></i>
            ProBot
        </div>
        <a class="nav-link active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a class="nav-link"><i data-lucide="bar-chart-2"></i> Trading</a>
        <a class="nav-link" onclick="scrollToElement('positions-panel')"><i data-lucide="pie-chart"></i> Positions</a>
        <a class="nav-link" onclick="scrollToElement('logs-panel')"><i data-lucide="terminal"></i> Logs</a>
        
        <div style="margin-top: auto;">
            <div class="nav-link" onclick="logout()"><i data-lucide="log-out"></i> Logout</div>
        </div>
    </nav>

    <main>
        <header>
            <div class="header-title">
                <h1>System Overview</h1>
                <p id="uptime-display">Bot offline</p>
            </div>
            <div class="controls">
                <div id="status-container" class="status-badge status-stopped">
                    <span class="dot"></span>
                    <span id="status-text">DISCONNECTED</span>
                </div>
                <button id="btn-pause" class="btn-outline" onclick="sendCommand('pause')">
                    <i data-lucide="pause-circle"></i> Pause Bot
                </button>
                <button id="btn-resume" class="btn-outline" style="display:none" onclick="sendCommand('resume')">
                    <i data-lucide="play-circle"></i> Resume
                </button>
                <button class="btn-danger" onclick="sendCommand('stop')">
                    <i data-lucide="power"></i> Kill Process
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="wallet"></i></div>
                <div class="stat-label">Total Equity</div>
                <div class="stat-value" id="val-equity">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--success); background: rgba(16, 185, 129, 0.1);"><i data-lucide="zap"></i></div>
                <div class="stat-label">Available USDT</div>
                <div class="stat-value" id="val-free">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--warning); background: rgba(245, 158, 11, 0.1);"><i data-lucide="refresh-cw"></i></div>
                <div class="stat-label">Last Sink</div>
                <div class="stat-value" style="font-size: 1rem;" id="val-last-update">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--secondary); background: rgba(129, 140, 248, 0.1);"><i data-lucide="layers"></i></div>
                <div class="stat-label">Active Pairs</div>
                <div class="stat-value" id="val-pairs">0</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel" id="positions-panel">
                <div class="panel-header">
                    <h2 class="panel-title"><i data-lucide="briefcase"></i> Active Positions</h2>
                </div>
                <table id="positions-table">
                    <thead>
                        <tr>
                            <th>Asset</th>
                            <th>Amount</th>
                            <th>Current Price</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="pos-body">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title"><i data-lucide="settings"></i> Pair Management</h2>
                </div>
                <div class="pair-list" id="pair-list">
                    <!-- Tags injected here -->
                </div>
                <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem;">
                    <input type="text" id="new-pair" placeholder="ETH/USDT" style="flex:1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.75rem; padding: 0.75rem; color: #fff; outline: none;">
                    <button class="btn-primary" onclick="addPair()">Add</button>
                </div>
            </div>

            <div class="panel" id="logs-panel">
                <div class="panel-header">
                    <h2 class="panel-title"><i data-lucide="terminal"></i> Live Bot Logs</h2>
                </div>
                <div class="logs-container" id="logs-container">
                    <!-- Logs injected here -->
                </div>
            </div>

            <div class="panel">
                <div class="panel-header" style="justify-content: flex-start; gap: 1rem;">
                    <h2 class="panel-title"><i data-lucide="history"></i> Trade History</h2>
                    <span style="font-size: 0.7rem; color: var(--text-muted)">(Last 50)</span>
                </div>
                <table style="font-size: 0.8rem;">
                    <thead>
                        <tr>
                            <th>Pair</th>
                            <th>Side</th>
                            <th>Price</th>
                            <th>PnL</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- History injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API = '/api';
        let botStartTime = null;

        function updateUptime() {
            if (!botStartTime) return;
            const start = new Date(botStartTime);
            const now = new Date();
            const diff = now - start;
            if (isNaN(diff)) return;

            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('uptime-display').innerText = `Uptime: ${hours}h ${minutes}m ${seconds}s`;
        }

        async function refresh() {
            try {
                const res = await fetch(`${API}/status`);
                if (res.status === 401) return;
                const data = await res.json();
                
                // Update Badge
                const cont = document.getElementById('status-container');
                const text = document.getElementById('status-text');
                const status = data.status || 'STOPPED';
                text.innerText = status;
                cont.className = `status-badge status-${status.toLowerCase()}`;

                // Update Control Btns
                document.getElementById('btn-pause').style.display = status === 'PAUSED' ? 'none' : 'flex';
                document.getElementById('btn-resume').style.display = status === 'PAUSED' ? 'flex' : 'none';

                // Data
                if (data.balance) {
                    document.getElementById('val-equity').innerText = `$${(data.balance.total_usdt || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    document.getElementById('val-free').innerText = `$${(data.balance.free_usdt || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                }
                
                document.getElementById('val-last-update').innerText = data.last_update ? new Date(data.last_update).toLocaleTimeString() : '--:--';
                botStartTime = data.start_time;

                // Positions
                const posBody = document.getElementById('pos-body');
                if (data.positions && data.positions.length > 0) {
                    posBody.innerHTML = data.positions.map(p => `
                        <tr>
                            <td><b>${p.symbol}</b></td>
                            <td>${p.amount.toFixed(4)}</td>
                            <td>$${(p.price || 0).toLocaleString()}</td>
                            <td><span class="badge-buy">ACTIVE</span></td>
                        </tr>
                    `).join('');
                } else {
                    posBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-muted)">No active positions</td></tr>';
                }

            } catch (e) {}
        }

        async function fetchHistory() {
            try {
                const res = await fetch(`${API}/trades`);
                const trades = await res.json();
                document.getElementById('history-body').innerHTML = trades.map(t => `
                    <tr>
                        <td><b>${t.symbol}</b></td>
                        <td><span class="${t.side === 'BUY' ? 'badge-buy' : 'badge-sell'}">${t.side}</span></td>
                        <td>$${t.price.toLocaleString()}</td>
                        <td style="color: ${t.pnl >= 0 ? 'var(--success)' : 'var(--danger)'}">${t.pnl >= 0 ? '+' : ''}${t.pnl.toFixed(2)}</td>
                    </tr>
                `).join('');
            } catch (e) {}
        }

        async function fetchPairs() {
            try {
                const res = await fetch(`${API}/symbols`);
                const symbols = await res.json();
                document.getElementById('val-pairs').innerText = symbols.length;
                document.getElementById('pair-list').innerHTML = symbols.map(s => `
                    <div class="pair-tag">
                        ${s}
                        <button class="btn-icon" onclick="removePair('${s}')"><i data-lucide="x" style="width:14px"></i></button>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) {}
        }

        async function fetchLogs() {
            try {
                const res = await fetch(`${API}/logs`);
                const logs = await res.json();
                const cont = document.getElementById('logs-container');
                const wasAtBottom = cont.scrollHeight - cont.clientHeight <= cont.scrollTop + 1;
                
                cont.innerHTML = logs.map(line => {
                    let type = 'info';
                    if (line.includes('[ERROR]')) type = 'error';
                    if (line.includes('[WARNING]')) type = 'warning';
                    return `<div class="log-line log-${type}">${line}</div>`;
                }).join('');

                if (wasAtBottom) cont.scrollTop = cont.scrollHeight;
            } catch (e) {}
        }

        async function sendCommand(command) {
            if (command === 'stop' && !confirm("KILL bot process?")) return;
            await fetch(`${API}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command })
            });
            refresh();
        }

        async function addPair() {
            const val = document.getElementById('new-pair').value.toUpperCase().trim();
            if (!val) return;
            await fetch(`${API}/symbols`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbol: val })
            });
            document.getElementById('new-pair').value = '';
            fetchPairs();
        }

        async function removePair(s) {
            await fetch(`${API}/symbols/${encodeURIComponent(s)}`, { method: 'DELETE' });
            fetchPairs();
        }

        function scrollToElement(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // Init
        lucide.createIcons();
        refresh();
        fetchHistory();
        fetchPairs();
        fetchLogs();

        setInterval(refresh, 3000);
        setInterval(updateUptime, 1000);
        setInterval(fetchHistory, 15000);
        setInterval(fetchLogs, 5000);
        setInterval(fetchPairs, 10000);
    </script>
</body>
</html>
